<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1>Customblock</h1>
      <p class="tagline">Every ad becomes an image</p>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Enabled</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-number" id="count">0</span>
        <span class="stat-label">ads replaced this session</span>
      </div>
    </div>

  <script src="popup.js"></script>
</body>
</html>
